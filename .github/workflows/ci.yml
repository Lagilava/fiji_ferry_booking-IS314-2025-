name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # Service containers matching production (Render: PostgreSQL + Redis).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ferry_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s --health-timeout=5s --health-retries=20
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=20

    env:
      # Django / app configuration (decouple reads these).
      SECRET_KEY: ci-test-secret-key-0123456789-not-for-production-use-only
      DEBUG: "True"                       # avoids ManifestStaticFilesStorage in tests
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ferry_ci
      DB_SSL_REQUIRE: "False"
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1
      # Agents are not needed in CI (and only start for server processes anyway).
      SERVER_MONITOR_ENABLED: "False"
      AUTOMATION_AGENT_ENABLED: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (libmagic for python-magic)
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Django system checks
        run: python manage.py check

      - name: No model/migration drift
        run: python manage.py makemigrations --check --dry-run

      - name: Run test suite with coverage
        run: |
          coverage run --source=bookings,accounts --omit="*/migrations/*,*/tests.py" manage.py test bookings accounts -v2
          coverage report

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
