{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Password Updated ✅</h1>
    </div>
    <p class="auth-note">
      Your password has been changed successfully. You can now log in with your
      new password.
    </p>
    <a href="{% url 'accounts:login' %}" class="auth-button">
      <i class="fas fa-sign-in-alt"></i> Log in now
    </a>
  </div>
</div>
{% endblock %}

{% block extra_css %}{% include 'accounts/_auth_card_styles.html' %}{% endblock %}
